<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FlexcardJC3A</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, hotpink, orchid);
        display: flex;
        justify-content: center;
        padding: 40px 0;
      }

      .main-container {
        background: #d9d9d9;
        border: 4px solid black;
        width: 500px;
        padding: 20px;
      }

      h2 {
        text-align: center;
        color: white;
        margin-top: -30px;
        margin-bottom: 20px;
        font-weight: bold;
      }

      .row {
        display: flex;
        border: 2px dashed black;
        padding: 15px;
        margin-bottom: 15px;
        gap: 15px;
      }

      .box {
        width: 70px;
        height: 70px;
        background-color: limegreen;
        border: 3px solid black;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div>
      <h2>FlexcardJC3A</h2>

      <div class="main-container">
        <div class="row">
          <div class="box">001</div>
          <div class="box">002</div>
        </div>

        <div class="row">
          <div class="box">003</div>
          <div class="box">004</div>
          <div class="box">005</div>
        </div>

        <div class="row">
          <div class="box">006</div>
          <div class="box">007</div>
          <div class="box">008</div>
          <div class="box">009</div>
        </div>

        <div class="row">
          <div class="box">010</div>
          <div class="box">011</div>
          <div class="box">012</div>
        </div>

        <div class="row">
          <div class="box">013</div>
          <div class="box">014</div>
        </div>

        <div class="row">
          <div class="box">015</div>
          <div class="box">016</div>
          <div class="box">017</div>
          <div class="box">018</div>
          <div class="box">019</div>
        </div>

        <div class="row">
          <div class="box">020</div>
          <div class="box">021</div>
        </div>
      </div>
    </div>
  </body>
</html>
